    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
        }
        /* MMM corposlop fonts */
        :root {
            --priary-color: #E34234;
            --secondary-theme: #E82514;
            --dark-orange: #d3480c;
            --orange: #FF6B35;
            --vibrant-bg: #f09d38;
            --dark-bg: #1f1d1b;
            --faint-orange-bg: #ffe1a4; /* for a little spazz*/
            --text-dark: #272727;
            --text-light: #f1efe2;
            --text-logo: #edfffd;
            --text-logo-anti: #ffffff;
            --text-logo-clanker: #4a3d18;
            --text-logo-hammer: #fff3ae;
            --text-muted: #807b6e;  

            --heading-font: 'Iceberg', cursive, sans-serif;
            --rubik-pixels : 'Rubik Pixels', cursive;
            --body-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /*advanced science stuff yall wont understand*/
        header {
            background-color: var(--vibrant-bg);
            padding: 1.5rem 3%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--secondary-theme);
        }

        .logo {
            color: var(--text-logo-anti);
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--heading-font); 
            line-height: 0.4;
        }
        /*if i have to guess, this one is probably for the secondary colors*/
        .logo span {
            color: var(--text-logo-clanker);
            font-family: var(--rubik-pixels);
            font-weight: 400;
            font-style : normal;
        }
        .logo second {
            color: var(--text-logo-hammer);
            font-family: var(--heading-font); 

        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--orange);
        }
        .hero {
            background: linear-gradient(135deg, var(--dark-bg) 60%, #2a2a2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: left;
            justify-content: flex-end; 
            padding: 0 20%;
            padding-top: 80px; /* Offset for fixed header */
            color: var(--text-light);
            position: relative;
            overflow: hidden;
        }

        /* Decorative background element */
        .hero::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 0px;
            height: 600px;
            background: radial-gradient(circle, rgba(227,66,52,0.15) 0%, rgba(255,107,53,0) 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .hero-content {
            position: relative;
            z-index: 12;
            text-align: left;
        }
        
        .right-trapezoid {
        /* Positioning it on the right side of the screen */
        position: fixed;
        top: 0;
        right: 0;
        width: 100vw;
        height: 100vh; /* Full screen height */
        
        /* Give it a background color or gradient */
        background: linear-gradient(90deg, #ff9318 0%, #ff3c00 100%);
        
        /* The magic: Top-Left, Top-Right, Bottom-Right, Bottom-Left */
        clip-path: polygon(65% 0%, 100% 0%, 100% 100%, 30% 100%);
        }

        .hero h1 {
            
            color: var(--text-logo-anti);
            font-size: 8.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--heading-font); 
            line-height: 0.6;
            z-index: 13;
        }

        .hero h1 span {
            color: var(--text-logo-clanker);
            font-family: var(--rubik-pixels);
            font-size: 6rem;
            font-weight: 400;
            font-style : normal;
            line-height: -1.1;
            z-index:14;
        }
        .hero h1 second {
            color: var(--text-logo-hammer);
            font-family: var(--heading-font); 
            font-size: 3rem;
            line-height: 1.1;
            z-index: 15;
        }
        .hero p {
            font-size: 4rem;
            margin-bottom: 2.5rem;
            color: #CCCCCC;
        }
        .hero p {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            color: #CCCCCC;
        }

        /* Buttons */
        .cta-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--vibrant-bg) 0%, var(--dark-orange) 100%);
            color: var(--text-light);
            padding: 0.8rem 2rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(227, 66, 52, 0.3);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 41, 23, 0.671);
        }

        /* Features/Services Section */
        .services {
            padding: 7rem 10%;
            background-color: var(--light-bg);
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 4rem;
            position: relative;
            font-weight: 700;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: var(--vermillion);
            margin: 10px auto 0 auto;
            border-radius: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .card {
            background-color: var(--text-light);
            padding: 2.5rem;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, border-top 0.2s ease;
            border-top: 4px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px);
            border-top: 4px solid var(--orange);
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background-color: rgba(255, 107, 53, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .card-icon svg {
            fill: var(--secondary-theme);
            width: 24px;
            height: 24px;
        }
    
        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: var(--dark-bg);
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Footer */
        footer {
            background-color: var(--dark-bg);
            color: var(--text-light);
            padding: 3rem 10% 2rem 10%;
            text-align: center;
            border-top: 1px solid #333;
        }

        .footer-content {
            margin-bottom: 2rem;
        }

        .footer-content p {
            color: #999;
            font-size: 0.9rem;
        }

        .copyright {
            font-size: 0.85rem;
            color: #666;
            border-top: 1px solid #2A2A2A;
            padding-top: 1.5rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                padding: 1rem 5%;
            }
            nav {
                display: none; /* Can be expanded into a burger menu */
            }
            .hero {
                padding: 0 5%;
                padding-top: 80px;
                text-align: right;
            }
            .hero h1 {
                font-size: 2.5rem;
            }
            .services {
                padding: 5rem 5%;
            }
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            overflow-x: hidden; /* Hides images when they go off-screen */
            display: flex;
            align-items: center; 
            height: 100vh;
        }

        .conveyor-container {
            width: 100vw;
            position: relative;
            height: 100vh; /* Matches the height of the images */
        }

        .looping-image {
            width: 150px; 
            height: auto;
            position: absolute; /* Allows images to layer and move independently */
            left: 0;
            /* Base animation settings */
            animation-name: conveyorLoop;
            animation-duration: 8s; /* Total time to cross the screen */
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            z-index: 1;
            /* Initially hide images off-screen before animation starts */
            transform: translate(-150px, 100vh) rotate(-45deg);
        }

        /* 
           STAGGERING THE IMAGES 
           With an 8-second total duration and 8 images, 
           we delay each one by exactly 1 second (8s / 8 = 1s spacing).
        */
        .img1 { animation-delay: 0s; }
        .img2 { animation-delay: 1s; }
        .img3 { animation-delay: 2s; }
        .img4 { animation-delay: 3s; }
        .img5 { animation-delay: 4s; }
        .img6 { animation-delay: 5s; }
        .img7 { animation-delay: 6s; }
        .img8 { animation-delay: 7s; }
        /* .img9 { animation-delay: 8s; } */

        @keyframes conveyorLoop {
            0% {
                transform: translate(-300px,100vh) rotate(-55deg); 
            }
            100% {
                transform: translate(40vw,-600px) rotate(-55deg); 
            }
        }
    </style>
</head>
