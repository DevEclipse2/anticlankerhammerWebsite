<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angled Conveyor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scene">
    <!-- The rotated container that forms the trapezium on the right -->
    <div class="trapezium-container">
      
      <!-- The scrolling track -->
      <div class="conveyor-track">
        
        <!-- SET 1 -->
        <div class="image-set">
          <img src="https://picsum.photos/seed/1/200/300" alt="1">
          <img src="https://picsum.photos/seed/2/200/300" alt="2">
          <img src="https://picsum.photos/seed/3/200/300" alt="3">
          <img src="https://picsum.photos/seed/4/200/300" alt="4">
        </div>

        <!-- SET 2 (Exact duplicate for seamless looping) -->
        <div class="image-set">
          <img src="https://picsum.photos/seed/1/200/300" alt="1">
          <img src="https://picsum.photos/seed/2/200/300" alt="2">
          <img src="https://picsum.photos/seed/3/200/300" alt="3">
          <img src="https://picsum.photos/seed/4/200/300" alt="4">
        </div>

      </div>
    </div>
  </div>

</body>
</html>
