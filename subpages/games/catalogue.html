    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* MMM corposlop fonts */
        :root {
            --priary-color: #E34234;
            --secondary-theme: #E82514;
            --dark-orange: #d3480c;
            --orange: #FF6B35;
            --vibrant-bg: #f09d38;
            --dark-bg: #1f1d1b;
            --faint-orange-bg: #ffe1a4; /* for a little spazz*/
            --text-dark: #272727;
            --text-light: #f1efe2;
            --text-logo: #edfffd;
            --text-logo-anti: #ffffff;
            --text-logo-clanker: #4a3d18;
            --text-logo-hammer: #fff3ae;
            --text-muted: #807b6e;  

            --heading-font: 'Iceberg', cursive, sans-serif;
            --rubik-pixels : 'Rubik Pixels', cursive;
            --Geneva : Geneva,comic-sans;
            --body-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /*advanced science stuff yall wont understand*/
        header {
            background-color: var(--vibrant-bg);
            padding: 1.5rem 3%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--secondary-theme);
        }
        .logo {
            color: var(--text-logo-anti);
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--heading-font); 
            line-height: 0.4;
            
        }
        /*if i have to guess, this one is probably for the secondary colors*/
        .logo span {
            color: var(--text-logo-clanker);
            font-family: var(--rubik-pixels);
            font-weight: 400;
            font-style : normal;
        }
        .logo second {
            color: var(--text-logo-hammer);
            font-family: var(--heading-font); 

        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--orange);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .card {
            background-color: var(--text-light);
            padding: 2.5rem;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, border-top 0.2s ease;
            border-top: 4px solid transparent;
            width: auto;
            height: auto;
        }

        .card:hover {
            transform: translateY(-5px);
            border-top: 4px solid var(--orange);
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background-color: rgba(255, 107, 53, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .card-icon svg {
            fill: var(--vermillion);
            width: 24px;
            height: 24px;
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: var(--dark-bg);
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 4rem;
            position: relative;
            font-weight: 700;
            font-family: var(--heading-font);
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: var(--dark-orange);
            margin: 10px auto 0 auto;
            border-radius: 2px;
        }
        .pageBkg
        {
            background: linear-gradient(135deg, var(--dark-bg) 60%, #2a2a2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: left;
            justify-content: flex-end; 
            /* padding: 0 20%; */
            padding-top: 180px; /* Offset for fixed header */
            color: var(--text-light);
            position: relative;
            overflow: hidden;
        }
        
        .pageBkg::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 0px;
            height: 600px;
            background: radial-gradient(circle, rgba(227,66,52,0.15) 0%, rgba(255,107,53,0) 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        footer {
            background-color: var(--dark-bg);
            color: var(--text-light);
            width: 100vw;
            padding: 3rem 10% 2rem 10%;
            text-align: center;
            border-top: 1px solid #333;
        }

        .footer-content {
            margin-bottom: 2rem;
        }

        .footer-content p {
            color: #999;
            font-size: 0.9rem;
        }

        .copyright {
            font-size: 0.85rem;
            color: #666;
            border-top: 1px solid #2A2A2A;
            padding-top: 1.5rem;
        }
        </style>
